name: ExpenseTracker
options:
  bundleIdPrefix: com.warmproductivity
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  SharedModels:
    path: ../../Packages/SharedModels
  SupabaseClient:
    path: ../../Packages/SupabaseClient
  SyncEngine:
    path: ../../Packages/SyncEngine
  SharedUI:
    path: ../../Packages/SharedUI
  SharedUtilities:
    path: ../../Packages/SharedUtilities
  RecurrenceEngine:
    path: ../../Packages/RecurrenceEngine

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    entitlements:
      path: ExpenseTracker.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.warmproductivity.shared
    configFiles:
      Debug: ../../Configuration/Testing.xcconfig
      Release: ../../Configuration/Production.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmproductivity.expensetracker
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ExpenseTracker.entitlements
    dependencies:
      - package: SharedModels
      - package: SupabaseClient
      - package: SyncEngine
      - package: SharedUI
      - package: SharedUtilities
      - package: RecurrenceEngine
