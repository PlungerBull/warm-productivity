name: ExpenseTracker
options:
  bundleIdPrefix: com.warmproductivity
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: ExpenseTracker.entitlements

packages:
  SharedModels:
    path: ../../Packages/SharedModels
  SupabaseClient:
    path: ../../Packages/SupabaseClient
  SyncEngine:
    path: ../../Packages/SyncEngine
  SharedUI:
    path: ../../Packages/SharedUI
  SharedUtilities:
    path: ../../Packages/SharedUtilities
  RecurrenceEngine:
    path: ../../Packages/RecurrenceEngine

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    entitlements:
      path: ExpenseTracker.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.warmproductivity.expensetracker
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Resources/Info.plist
      configs:
        Debug:
          XCCONFIG_FILE: ../../Configuration/Testing.xcconfig
        Release:
          XCCONFIG_FILE: ../../Configuration/Production.xcconfig
    dependencies:
      - package: SharedModels
      - package: SupabaseClient
      - package: SyncEngine
      - package: SharedUI
      - package: SharedUtilities
      - package: RecurrenceEngine
